name: Deploy to Linux Server

on:
  push:
    branches: ["main"]

env:
  APP_NAME: d-korea-law-api
  APP_DIR: /opt/docker/d-korea-law-api
  APP_PORT: 5556

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔑 SSH 키 설정
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
      
          ssh-keyscan -T 5 -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts || true

      - name: Check SSH key
        run: |
          ls -l ~/.ssh
          head -n 3 ~/.ssh/id_rsa

      - name: Test SSH
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "whoami; hostname"

      # 🚀 서버 배포
      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=no \
            -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} <<EOF
          
          set -e
          
          # /opt/docker 디렉토리 생성
          sudo mkdir -p "$APP_DIR"
          sudo chown deploy:deploy "$APP_DIR"
          cd "$APP_DIR"
          
          if [ ! -d ".git" ]; then
            git clone https://github.com/HDomi/d-korea-law-api.git .
          else
            git pull origin main
          fi
          
          # Docker 컨테이너 배포
          sudo docker stop "$APP_NAME" || true
          sudo docker rm "$APP_NAME" || true
          
          sudo docker build -t "$APP_NAME:latest" .

          # Run docker with ports and environment variables
          sudo docker run -d \
            --restart unless-stopped \
            --name "$APP_NAME" \
            -p "$APP_PORT:$APP_PORT" \
            -e PORT="$APP_PORT" \
            -e NODE_ENV="production" \
            -e LAW_API_OC="${{ secrets.LAW_API_OC }}" \
            -e GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
            "$APP_NAME:latest"

          EOF
